name: CI — Qualite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # ESLint
      - name: ESLint
        run: pnpm eslint . --format json --output-file eslint-report.json || true

      - name: ESLint (fail on errors)
        run: pnpm eslint .

      # Prettier
      - name: Prettier check
        run: pnpm prettier --check .

      # Svelte type check
      - name: Svelte Check
        run: pnpm check

  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Check coverage threshold
        run: |
          # Verifier que la couverture ne descend pas en dessous de 40%
          COVERAGE=$(cat coverage/coverage-summary.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['total']['lines']['pct'])")
          echo "Coverage: ${COVERAGE}%"
          python3 -c "exit(0 if float('${COVERAGE}') >= 40 else 1)" || (echo '::error::Coverage below 40% threshold' && exit 1)

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: frontend/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
